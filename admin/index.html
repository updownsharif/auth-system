```html
<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
</head>
<body>

<h2>Login</h2>

<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<script>
async function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    const res = await fetch("https://raw.githubusercontent.com/updownsharif/auth-system/main/data/admins.json");
    const data = await res.json();

    const found = data.find(a => a.username === user && a.password === pass);

    if(found){
        localStorage.setItem("admin", JSON.stringify(found));
        window.location.href = "dashboard.html";
    } else {
        alert("Invalid login");
    }
}
</script>

</body>
</html>
```
