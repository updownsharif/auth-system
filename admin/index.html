```html
<!DOCTYPE html>
<html>
<head>
  <title>Falcon Login</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <!-- Particles -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #0a0a0a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .login-box {
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border: 1px solid cyan;
      box-shadow: 0 0 20px cyan;
      text-align: center;
    }

    h2 {
      color: cyan;
      text-shadow: 0 0 10px cyan;
    }

    input {
      width: 200px;
      padding: 10px;
      margin: 10px;
      background: transparent;
      border: 1px solid cyan;
      color: white;
      outline: none;
    }

    input:focus {
      box-shadow: 0 0 10px cyan;
    }

    button {
      padding: 10px 20px;
      border: 1px solid cyan;
      background: transparent;
      color: cyan;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: cyan;
      color: black;
      box-shadow: 0 0 10px cyan;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div id="particles-js"></div>

<div class="login-box">
  <h2>Falcon Panel</h2>

  <input type="text" id="username" placeholder="Username"><br>
  <input type="password" id="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>

  <div class="error" id="error"></div>
</div>

<script>
// particles
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 2 },
    line_linked: { enable: true }
  }
});

// login
async function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    const res = await fetch("https://raw.githubusercontent.com/updownsharif/auth-system/main/data/admins.json");
    const data = await res.json();

    const found = data.find(a => a.username === user && a.password === pass);

    if(found){
        localStorage.setItem("admin", JSON.stringify(found));
        window.location.href = "./dashboard.html";
    } else {
        document.getElementById("error").innerText = "Invalid login!";
    }
}
</script>

</body>
</html>
