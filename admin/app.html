```html
<!DOCTYPE html>
<html>
<head>
  <title>Manage App</title>
</head>
<body>

<h2 id="appname"></h2>

<h3>Users</h3>
<div id="users"></div>

<h3>Licenses</h3>
<div id="licenses"></div>

<script>
const app = JSON.parse(localStorage.getItem("currentApp"));

document.getElementById("appname").innerText = app.name;

async function loadApp(){
    const res = await fetch(app.file);
    const data = await res.json();

    const usersDiv = document.getElementById("users");
    const licDiv = document.getElementById("licenses");

    usersDiv.innerHTML = "";
    licDiv.innerHTML = "";

    data.users.forEach(u => {
        usersDiv.innerHTML += "👤 " + u.username + " (" + u.expiry + ")<br>";
    });

    data.licenses.forEach(l => {
        licDiv.innerHTML += "🔑 " + l.key + " (" + l.expiry + ")<br>";
    });
}

loadApp();
</script>

</body>
</html>
```
