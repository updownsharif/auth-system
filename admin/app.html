<!DOCTYPE html>
<html>
<head>
  <title>Manage App</title>
</head>
<body>

<h2 id="appname"></h2>

<hr>

<button onclick="addUser()">➕ Add User</button>
<button onclick="addLicense()">🔑 Add License</button>
  <button onclick="saveToGitHub()">💾 Save</button>

<hr>

<h3>Users</h3>
<div id="users"></div>

<h3>Licenses</h3>
<div id="licenses"></div>

<script>
const GITHUB_TOKEN = "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";
const REPO = "updownsharif/auth-system";
const FILE_PATH = `apps/${app.name}.json`;
const app = JSON.parse(localStorage.getItem("currentApp"));
document.getElementById("appname").innerText = app.name;

let appData = null;

async function loadApp(){
    const res = await fetch(app.file);
    appData = await res.json();

    render();
}

function render(){
    const usersDiv = document.getElementById("users");
    const licDiv = document.getElementById("licenses");

    usersDiv.innerHTML = "";
    licDiv.innerHTML = "";

    appData.users.forEach((u, index) => {
        usersDiv.innerHTML += `
            👤 ${u.username} (${u.expiry})
            <button onclick="deleteUser(${index})">❌</button>
            <br>
        `;
    });

    appData.licenses.forEach((l, index) => {
        licDiv.innerHTML += `
            🔑 ${l.key} (${l.expiry})
            <button onclick="deleteLicense(${index})">❌</button>
            <br>
        `;
    });
}

  async function saveToGitHub() {
    const url = `https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`;

    try {
        // Get current file
        const res = await fetch(url, {
            headers: {
                Authorization: "token " + GITHUB_TOKEN
            }
        });

        const file = await res.json();

        if (!file.sha) {
            alert("Error: File not found or bad token");
            console.log(file);
            return;
        }

        // Update file
        const update = await fetch(url, {
            method: "PUT",
            headers: {
                Authorization: "token " + GITHUB_TOKEN,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: "update app data",
                content: btoa(JSON.stringify(appData, null, 2)),
                sha: file.sha
            })
        });

        const result = await update.json();

        if (update.ok) {
            alert("Saved to GitHub ✅");
        } else {
            alert("Save failed ❌");
            console.log(result);
        }

    } catch (err) {
        console.error(err);
        alert("Error occurred");
    }
}

// ADD USER
function addUser(){
    const username = prompt("Enter username");
    const password = prompt("Enter password");
    const expiry = prompt("Enter expiry (YYYY-MM-DD)");

    if(!username || !password || !expiry) return;

    appData.users.push({
        username,
        password,
        expiry
    });

    alert("User added (not saved yet)");
    render();
}

// ADD LICENSE
function addLicense(){
    const key = prompt("Enter license key");
    const expiry = prompt("Enter expiry (YYYY-MM-DD)");

    if(!key || !expiry) return;

    appData.licenses.push({
        key,
        expiry
    });

    alert("License added (not saved yet)");
    render();
}

// DELETE USER
function deleteUser(index){
    appData.users.splice(index, 1);
    render();
}

// DELETE LICENSE
function deleteLicense(index){
    appData.licenses.splice(index, 1);
    render();
}

loadApp();
</script>

</body>
</html>
