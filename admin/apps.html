<!DOCTYPE html>
<html>
<head>
  <title>Falcon Apps</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <!-- Particles -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #0a0a0a;
      color: white;
      overflow: hidden;
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .container {
      padding: 30px;
    }

    h2 {
      color: cyan;
      text-shadow: 0 0 10px cyan;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 20px;
      color: cyan;
      border: 1px solid cyan;
      padding: 10px;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      padding: 20px;
      border: 1px solid rgba(0,255,255,0.2);
      cursor: pointer;
      transition: 0.3s;
      text-align: center;
    }

    .card:hover {
      box-shadow: 0 0 15px cyan;
      transform: scale(1.05);
    }

    button {
      padding: 10px 15px;
      border: 1px solid cyan;
      background: transparent;
      color: cyan;
      cursor: pointer;
    }

    button:hover {
      background: cyan;
      color: black;
    }
  </style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">

  <div class="topbar">
    <h2>Your Apps</h2>
    <div class="logo" id="logo"></div>
  </div>

  <div class="grid" id="apps"></div>

  <br>
  <button onclick="goBack()">⬅ Back</button>

</div>

<script>
// particles
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 2 },
    line_linked: { enable: true }
  }
});

// get admin
const admin = JSON.parse(localStorage.getItem("admin"));

if(!admin){
    alert("Login first!");
    window.location.href = "index.html";
}

// logo
document.getElementById("logo").innerText = admin.username.charAt(0).toUpperCase();

// render apps
const container = document.getElementById("apps");

admin.apps.forEach(app => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerText = app.name;

    card.onclick = () => {
        localStorage.setItem("currentApp", JSON.stringify(app));
        window.location.href = "/auth-system/admin/app.html";
    };

    container.appendChild(card);
});

// back
function goBack(){
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
